<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certificación Código de Colores – INACAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --inacap-red: #e2231a;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--inacap-red);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--inacap-red);
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tabla de referencia mejorada */
        .ref-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin: 20px 0;
        }

        .ref-table th { color: var(--inacap-red); text-align: left; padding: 10px; border-bottom: 2px solid var(--border); }
        .ref-table td { padding: 8px 10px; border-bottom: 1px solid #222; }

        .swatch {
            width: 18px; height: 18px;
            display: inline-block;
            border-radius: 4px;
            margin-right: 10px;
            vertical-align: middle;
            border: 1px solid #444;
        }

        /* Colores */
        .negro { background: #000; } .marron { background: #6b3e23; } .rojo { background: #ff0000; }
        .naranja { background: #ff8c00; } .amarillo { background: #ffff00; } .verde { background: #008000; }
        .azul { background: #0000ff; } .violeta { background: #8a2be2; } .gris { background: #808080; }
        .blanco { background: #ffffff; }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--inacap-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .resistor-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px 0;
        }

        .wire { height: 4px; width: 35px; background: #555; }
        .r-body {
            display: flex;
            height: 50px;
            background: #d1b48c;
            border-radius: 10px;
            padding: 0 15px;
            align-items: stretch;
            gap: 12px;
        }

        .b { width: 14px; }
        .dorado { background: #ffd700; }

        .watermark {
            text-align: center;
            font-size: 0.75rem;
            color: #444;
            margin-top: 25px;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1 class="logo">INACAP</h1>
        <div style="font-weight: 600; letter-spacing: 2px; color: var(--text-dim);">ENTRENADOR DE RESISTENCIAS</div>
    </header>

    <div id="screen-study" class="card">
        <h3 style="text-align:center; margin-top:0; color:var(--inacap-red);">REPASO DE CÓDIGO</h3>
        <table class="ref-table">
            <thead>
                <tr><th>Color</th><th>Díg.</th><th>Mult.</th></tr>
            </thead>
            <tbody>
                <tr><td><span class="swatch negro"></span> Negro</td><td>0</td><td>x1</td></tr>
                <tr><td><span class="swatch marron"></span> Marrón / Café</td><td>1</td><td>x10</td></tr>
                <tr><td><span class="swatch rojo"></span> Rojo</td><td>2</td><td>x100</td></tr>
                <tr><td><span class="swatch naranja"></span> Naranja / Naranjo</td><td>3</td><td>x1k</td></tr>
                <tr><td><span class="swatch amarillo"></span> Amarillo</td><td>4</td><td>x10k</td></tr>
                <tr><td><span class="swatch verde"></span> Verde</td><td>5</td><td>x100k</td></tr>
                <tr><td><span class="swatch azul"></span> Azul</td><td>6</td><td>x1M</td></tr>
                <tr><td><span class="swatch violeta"></span> Violeta</td><td>7</td><td>-</td></tr>
                <tr><td><span class="swatch gris"></span> Gris</td><td>8</td><td>-</td></tr>
                <tr><td><span class="swatch blanco"></span> Blanco</td><td>9</td><td>-</td></tr>
            </tbody>
        </table>
        <button class="btn" onclick="startQuiz()">Comenzar Desafío</button>
    </div>

    <div id="screen-quiz" class="card hidden">
        <div id="q-header" style="font-size:0.8rem; color: var(--inacap-red); font-weight: 800; margin-bottom: 10px;"></div>
        <div id="q-content"></div>
        <div id="feedback" style="padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; text-align: center; font-weight: 600;"></div>
        <button id="btn-action" class="btn">Validar</button>
    </div>

    <div id="screen-result" class="card hidden" style="text-align: center;">
        <h2 style="margin-top:0;">Certificación Exitosa</h2>
        <div id="final-grade" style="font-family: 'Orbitron'; font-size: 5rem; color: var(--inacap-red); line-height:1;"></div>
        <p id="final-stats" style="margin: 20px 0; color: var(--text-dim);"></p>
        <button class="btn" onclick="location.reload()">Reiniciar</button>
    </div>

    <div class="watermark">Docente NMZ - versión 1 - 2026</div>
</div>

<script>
    const COLORS = [
        { n: 'negro', d: 0, m: 1, c: 'negro' },
        { n: 'marron', alt: 'cafe', d: 1, m: 10, c: 'marron' },
        { n: 'rojo', d: 2, m: 100, c: 'rojo' },
        { n: 'naranja', alt: 'naranjo', d: 3, m: 1000, c: 'naranja' },
        { n: 'amarillo', d: 4, m: 10000, c: 'amarillo' },
        { n: 'verde', d: 5, m: 100000, c: 'verde' },
        { n: 'azul', d: 6, m: 1000000, c: 'azul' },
        { n: 'violeta', d: 7, m: 0, c: 'violeta' },
        { n: 'gris', d: 8, m: 0, c: 'gris' },
        { n: 'blanco', d: 9, m: 0, c: 'blanco' }
    ];

    let currentQ = 0, score = 0, questions = [];

    function startQuiz() {
        for(let i=0; i<10; i++) {
            const d1 = Math.floor(Math.random() * 9) + 1;
            const d2 = Math.floor(Math.random() * 10);
            const mIdx = Math.floor(Math.random() * 7); 
            questions.push({
                d1: COLORS.find(c => c.d === d1),
                d2: COLORS.find(c => c.d === d2),
                m: COLORS[mIdx],
                val: (d1 * 10 + d2) * COLORS[mIdx].m,
                type: i % 2 === 0 ? 'color-to-val' : 'val-to-color'
            });
        }
        document.getElementById('screen-study').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        const content = document.getElementById('q-content');
        const fb = document.getElementById('feedback');
        const btn = document.getElementById('btn-action');
        
        document.getElementById('q-header').innerText = `DESAFÍO ${currentQ + 1} / 10`;
        fb.style.display = 'none';
        btn.innerText = "Validar";
        btn.onclick = checkAnswer;

        if(q.type === 'color-to-val') {
            content.innerHTML = `
                <p style="text-align:center;">¿Cuál es el valor óhmico?</p>
                <div class="resistor-container">
                    <div class="wire"></div>
                    <div class="r-body">
                        <div class="b ${q.d1.c}"></div>
                        <div class="b ${q.d2.c}"></div>
                        <div class="b ${q.m.c}"></div>
                        <div style="width:25px"></div>
                        <div class="b dorado"></div>
                    </div>
                    <div class="wire"></div>
                </div>
                <input type="number" id="ans" placeholder="Ej: 220">
            `;
        } else {
            content.innerHTML = `
                <p style="text-align:center;">Indica los colores para:</p>
                <h2 style="text-align:center; color: var(--inacap-red); margin: 15px 0;">${q.val} Ω</h2>
                <input type="text" id="b1" placeholder="Color Banda 1" autocomplete="off">
                <input type="text" id="b2" placeholder="Color Banda 2" autocomplete="off">
                <input type="text" id="b3" placeholder="Color Multiplicador" autocomplete="off">
            `;
        }
    }

    function checkAnswer() {
        const q = questions[currentQ];
        let correct = false;
        let solution = "";

        const normalize = (text) => {
            return text.toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Quitar tildes
                .replace('cafe', 'marron')
                .replace('naranjo', 'naranja');
        };

        if(q.type === 'color-to-val') {
            const userVal = parseInt(document.getElementById('ans').value);
            correct = userVal === q.val;
            solution = `Correcto: ${q.val} Ω`;
        } else {
            const u1 = normalize(document.getElementById('b1').value);
            const u2 = normalize(document.getElementById('b2').value);
            const u3 = normalize(document.getElementById('b3').value);
            
            correct = u1 === normalize(q.d1.n) && 
                      u2 === normalize(q.d2.n) && 
                      u3 === normalize(q.m.n);
            solution = `Colores: ${q.d1.n}, ${q.d2.n}, ${q.m.n}`;
        }

        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        fb.style.background = correct ? '#1b4332' : '#4e1616';
        fb.style.color = correct ? '#81c784' : '#ffbaba';
        fb.innerText = correct ? "¡CORRECTO!" : `INCORRECTO. ${solution}`;

        if(correct) score++;
        
        const btn = document.getElementById('btn-action');
        btn.innerText = "Siguiente";
        btn.onclick = () => {
            currentQ++;
            if(currentQ < 10) showQuestion();
            else showResult();
        };
    }

    function showResult() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        let nota = (score < 6) ? (score * 3 / 6) + 1 : ((score - 6) * 3 / 4) + 4;
        document.getElementById('final-grade').innerText = nota.toFixed(1);
        document.getElementById('final-stats').innerText = `Lograste ${score} de 10 aciertos totales.`;
    }
</script>
</body>
</html>
