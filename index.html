<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenador Código de Colores – Docente NMZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --inacap-red: #e2231a; --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #ffffff; --border: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        #app { width: 100%; max-width: 500px; padding: 20px; }
        header { text-align: center; border-bottom: 3px solid var(--inacap-red); margin-bottom: 25px; padding-bottom: 15px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--inacap-red); margin: 0; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Tabla */
        .ref-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 15px 0; }
        .ref-table th { color: var(--inacap-red); text-align: left; padding: 8px; border-bottom: 2px solid var(--border); }
        .ref-table td { padding: 6px 8px; border-bottom: 1px solid #222; }
        .swatch { width: 14px; height: 14px; display: inline-block; border-radius: 2px; margin-right: 8px; vertical-align: middle; border: 1px solid #444; }

        /* Colores */
        .negro { background: #000; } .marron { background: #6b3e23; } .rojo { background: #ff0000; }
        .naranja { background: #ff8c00; } .amarillo { background: #ffff00; } .verde { background: #008000; }
        .azul { background: #0000ff; } .violeta { background: #8a2be2; } .gris { background: #808080; }
        .blanco { background: #ffffff; } .dorado { background: #ffd700; }

        /* Resistencia */
        .resistor-container { display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .wire { height: 4px; width: 30px; background: #555; }
        .r-body { display: flex; height: 45px; background: #d1b48c; border-radius: 8px; padding: 0 15px; align-items: stretch; gap: 10px; }
        .b { width: 12px; }

        .btn { width: 100%; padding: 15px; background: var(--inacap-red); color: white; border: none; border-radius: 6px; font-family: 'Orbitron', sans-serif; cursor: pointer; text-transform: uppercase; font-weight: 700; margin-top: 10px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid var(--border); color: white; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        .watermark { text-align: center; font-size: 0.7rem; color: #444; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1 class="logo">DESAFÍO 2026</h1>
        <div style="font-size: 0.8rem; letter-spacing: 1px;">ENTRENADOR DE CÓDIGO DE COLORES</div>
    </header>

    <div id="screen-study" class="card">
        <h3 style="margin-top:0; text-align:center;">REPASO OBLIGATORIO</h3>
        <table class="ref-table">
            <thead><tr><th>Color</th><th>Díg.</th><th>Mult.</th></tr></thead>
            <tbody id="ref-body"></tbody>
        </table>
        <button class="btn" onclick="startQuiz()">Comenzar Desafío</button>
    </div>

    <div id="screen-quiz" class="card hidden">
        <div id="q-header" style="color: var(--inacap-red); font-weight: 800; margin-bottom: 15px; font-size: 0.9rem;"></div>
        <div id="q-content"></div>
        <div id="feedback" style="padding: 12px; border-radius: 6px; margin: 15px 0; display: none; text-align: center; font-weight: 600;"></div>
        <button id="btn-action" class="btn">Validar</button>
    </div>

    <div id="screen-result" class="card hidden" style="text-align: center;">
        <h2 style="margin-top:0;">Resultado Final</h2>
        <div id="final-grade" style="font-family: 'Orbitron'; font-size: 4rem; color: var(--inacap-red);"></div>
        <p id="final-stats"></p>
        <button class="btn" onclick="location.reload()">Reiniciar</button>
    </div>

    <div class="watermark">Docente NMZ - versión 1 - 2026</div>
</div>

<script>
    const COLORS = [
        { n: 'negro', d: 0, m: 1, c: 'negro' },
        { n: 'marron', d: 1, m: 10, c: 'marron' }, // Aceptará café
        { n: 'rojo', d: 2, m: 100, c: 'rojo' },
        { n: 'naranja', d: 3, m: 1000, c: 'naranja' }, // Aceptará naranjo
        { n: 'amarillo', d: 4, m: 10000, c: 'amarillo' },
        { n: 'verde', d: 5, m: 100000, c: 'verde' },
        { n: 'azul', d: 6, m: 1000000, c: 'azul' },
        { n: 'violeta', d: 7, m: 0, c: 'violeta' },
        { n: 'gris', d: 8, m: 0, c: 'gris' },
        { n: 'blanco', d: 9, m: 0, c: 'blanco' }
    ];

    let currentQ = 0, score = 0, questions = [];

    // Llenar tabla de estudio
    const tbody = document.getElementById('ref-body');
    COLORS.forEach(col => {
        tbody.innerHTML += `<tr>
            <td><span class="swatch ${col.c}"></span> ${col.n.toUpperCase()}</td>
            <td>${col.d}</td>
            <td>${col.m > 0 ? 'x' + col.m : '-'}</td>
        </tr>`;
    });

    function startQuiz() {
        questions = [];
        for(let i=0; i<10; i++) {
            const d1 = COLORS[Math.floor(Math.random() * 9) + 1];
            const d2 = COLORS[Math.floor(Math.random() * 10)];
            const m = COLORS[Math.floor(Math.random() * 7)];
            questions.push({
                d1, d2, m,
                val: (d1.d * 10 + d2.d) * m.m,
                type: i % 2 === 0 ? 'color-to-val' : 'val-to-color'
            });
        }
        document.getElementById('screen-study').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        const content = document.getElementById('q-content');
        const fb = document.getElementById('feedback');
        const btn = document.getElementById('btn-action');
        
        document.getElementById('q-header').innerText = `EJERCICIO ${currentQ + 1} DE 10`;
        fb.style.display = 'none';
        btn.innerText = "Validar Respuesta";
        btn.onclick = checkAnswer; // Aseguramos que el click llame a la función

        if(q.type === 'color-to-val') {
            content.innerHTML = `
                <p style="text-align:center">Determine el valor en Ohmios (Ω):</p>
                <div class="resistor-container">
                    <div class="wire"></div>
                    <div class="r-body">
                        <div class="b ${q.d1.c}"></div>
                        <div class="b ${q.d2.c}"></div>
                        <div class="b ${q.m.c}"></div>
                        <div style="width:20px"></div>
                        <div class="b dorado"></div>
                    </div>
                    <div class="wire"></div>
                </div>
                <input type="number" id="ans_val" placeholder="Ingrese valor numérico">
            `;
        } else {
            content.innerHTML = `
                <p style="text-align:center">Escriba los colores para:</p>
                <h2 style="text-align:center; color: var(--inacap-red);">${q.val} Ω</h2>
                <input type="text" id="ans_b1" placeholder="Color Banda 1" autocomplete="off">
                <input type="text" id="ans_b2" placeholder="Color Banda 2" autocomplete="off">
                <input type="text" id="ans_b3" placeholder="Color Banda 3 (Mult.)" autocomplete="off">
            `;
        }
    }

    function checkAnswer() {
        const q = questions[currentQ];
        let isCorrect = false;
        let msg = "";

        const clean = (str) => str.toLowerCase().trim()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Quitar tildes
            .replace('cafe', 'marron')
            .replace('naranjo', 'naranja');

        if(q.type === 'color-to-val') {
            const userVal = parseInt(document.getElementById('ans_val').value);
            isCorrect = userVal === q.val;
            msg = `Valor correcto: ${q.val} Ω`;
        } else {
            const b1 = clean(document.getElementById('ans_b1').value);
            const b2 = clean(document.getElementById('ans_b2').value);
            const b3 = clean(document.getElementById('ans_b3').value);
            isCorrect = (b1 === q.d1.n && b2 === q.d2.n && b3 === q.m.n);
            msg = `Colores: ${q.d1.n}, ${q.d2.n}, ${q.m.n}`;
        }

        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        fb.style.background = isCorrect ? '#1b4332' : '#4e1616';
        fb.style.color = isCorrect ? '#81c784' : '#ffbaba';
        fb.innerText = isCorrect ? "¡ACIERTO!" : `ERROR. ${msg}`;

        if(isCorrect) score++;

        const btn = document.getElementById('btn-action');
        btn.innerText = "Continuar";
        btn.onclick = () => {
            currentQ++;
            if(currentQ < 10) showQuestion();
            else showResult();
        };
    }

    function showResult() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        let nota = (score < 6) ? (score * 3 / 6) + 1 : ((score - 6) * 3 / 4) + 4;
        document.getElementById('final-grade').innerText = nota.toFixed(1);
        document.getElementById('final-stats').innerText = `Aprobaste ${score} de 10 ejercicios planteados.`;
    }
</script>
</body>
</html>
