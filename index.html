<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certificación Código de Colores – INACAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --inacap-red: #e2231a;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--inacap-red);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--inacap-red);
            margin: 0;
        }

        .tagline {
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tabla de referencia */
        .ref-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin: 15px 0;
        }

        .ref-table th { color: var(--inacap-red); text-align: left; padding: 8px; border-bottom: 1px solid var(--border); }
        .ref-table td { padding: 6px 8px; border-bottom: 1px solid #222; }

        .swatch {
            width: 15px; height: 15px;
            display: inline-block;
            border-radius: 3px;
            margin-right: 8px;
            border: 1px solid #444;
        }

        /* Resistencia */
        .resistor-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
        }

        .wire { height: 4px; width: 30px; background: #555; }
        .r-body {
            display: flex;
            height: 45px;
            background: #d1b48c;
            border-radius: 8px;
            padding: 0 15px;
            align-items: stretch;
            gap: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .b { width: 12px; }

        /* Colores de las bandas */
        .negro { background: #000; } .marron { background: #6b3e23; } .rojo { background: #ff0000; }
        .naranja { background: #ff8c00; } .amarillo { background: #ffff00; } .verde { background: #008000; }
        .azul { background: #0000ff; } .violeta { background: #8a2be2; } .gris { background: #808080; }
        .blanco { background: #ffffff; } .dorado { background: #ffd700; }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--inacap-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .watermark {
            text-align: center;
            font-size: 0.7rem;
            color: #444;
            margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1 class="logo">INACAP</h1>
        <div class="tagline">Electrónica Básica</div>
        <div style="font-weight: 600; margin-top: 5px;">Certificación de Colores</div>
    </header>

    <div id="screen-study" class="card">
        <h3 style="margin-top:0">Tabla de Referencia</h3>
        <table class="ref-table">
            <thead>
                <tr><th>Color</th><th>Dígito</th><th>Mult.</th></tr>
            </thead>
            <tbody id="ref-body"></tbody>
        </table>
        <button class="btn" onclick="startQuiz()">Entendido, Comenzar</button>
    </div>

    <div id="screen-quiz" class="card hidden">
        <div id="q-header" style="color: var(--inacap-red); font-weight: 700; margin-bottom: 15px;"></div>
        <div id="q-content"></div>
        <div id="feedback" style="padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none;"></div>
        <button id="btn-action" class="btn" onclick="checkAnswer()">Validar</button>
    </div>

    <div id="screen-result" class="card hidden" style="text-align: center;">
        <h2>Certificación Finalizada</h2>
        <div id="final-grade" style="font-family: 'Orbitron'; font-size: 4rem; color: var(--inacap-red);"></div>
        <p id="final-stats"></p>
        <button class="btn" onclick="location.reload()">Reintentar</button>
    </div>

    <div class="watermark">Docente NMZ - versión 1 - 2026</div>
</div>

<script>
    const COLORS = [
        { n: 'Negro', d: 0, m: 1, c: 'negro' },
        { n: 'Marrón', d: 1, m: 10, c: 'marron' },
        { n: 'Rojo', d: 2, m: 100, c: 'rojo' },
        { n: 'Naranja', d: 3, m: 1000, c: 'naranja' },
        { n: 'Amarillo', d: 4, m: 10000, c: 'amarillo' },
        { n: 'Verde', d: 5, m: 100000, c: 'verde' },
        { n: 'Azul', d: 6, m: 1000000, c: 'azul' },
        { n: 'Violeta', d: 7, m: 0, c: 'violeta' },
        { n: 'Gris', d: 8, m: 0, c: 'gris' },
        { n: 'Blanco', d: 9, m: 0, c: 'blanco' }
    ];

    let currentQ = 0, score = 0, questions = [];

    // Cargar tabla de estudio al inicio
    const tbody = document.getElementById('ref-body');
    COLORS.forEach(col => {
        if(col.d < 10) {
            tbody.innerHTML += `<tr>
                <td><span class="swatch ${col.c}"></span> ${col.n}</td>
                <td>${col.d}</td>
                <td>${col.m ? 'x' + col.m : '-'}</td>
            </tr>`;
        }
    });

    function startQuiz() {
        // Generar 10 preguntas (5 de cada tipo)
        for(let i=0; i<10; i++) {
            const d1 = Math.floor(Math.random() * 9) + 1;
            const d2 = Math.floor(Math.random() * 10);
            const mObj = COLORS[Math.floor(Math.random() * 7)]; // Solo colores con multiplicador
            questions.push({
                d1: COLORS.find(c => c.d === d1),
                d2: COLORS.find(c => c.d === d2),
                m: mObj,
                val: (d1 * 10 + d2) * mObj.m,
                type: i % 2 === 0 ? 'color-to-val' : 'val-to-color'
            });
        }
        document.getElementById('screen-study').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        const content = document.getElementById('q-content');
        document.getElementById('q-header').innerText = `PREGUNTA ${currentQ + 1} DE 10`;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-action').innerText = "Validar";
        document.getElementById('btn-action').onclick = checkAnswer;

        if(q.type === 'color-to-val') {
            content.innerHTML = `
                <p>Calcula el valor de la resistencia según las bandas:</p>
                <div class="resistor-container">
                    <div class="wire"></div>
                    <div class="r-body">
                        <div class="b ${q.d1.c}"></div>
                        <div class="b ${q.d2.c}"></div>
                        <div class="b ${q.m.c}"></div>
                        <div style="width:20px"></div>
                        <div class="b dorado"></div>
                    </div>
                    <div class="wire"></div>
                </div>
                <input type="number" id="ans" placeholder="Valor en Ohmios (Ω)">
            `;
        } else {
            content.innerHTML = `
                <p>Indica los colores para una resistencia de:</p>
                <h2 style="text-align:center; color: var(--inacap-red);">${q.val} Ω</h2>
                <input type="text" id="b1" placeholder="Color Banda 1">
                <input type="text" id="b2" placeholder="Color Banda 2">
                <input type="text" id="b3" placeholder="Color Banda 3 (Multiplicador)">
            `;
        }
    }

    function checkAnswer() {
        const q = questions[currentQ];
        let correct = false;
        let info = "";

        if(q.type === 'color-to-val') {
            const userVal = parseInt(document.getElementById('ans').value);
            correct = userVal === q.val;
            info = `El valor correcto era ${q.val} Ω`;
        } else {
            const u1 = document.getElementById('b1').value.toLowerCase();
            const u2 = document.getElementById('b2').value.toLowerCase();
            const u3 = document.getElementById('b3').value.toLowerCase();
            
            // Función para normalizar nombres (marrón/cafe)
            const norm = (s) => s.replace('ó','o').replace('é','e').replace('cafe','marron');
            
            correct = norm(u1).includes(norm(q.d1.n).toLowerCase()) && 
                      norm(u2).includes(norm(q.d2.n).toLowerCase()) && 
                      norm(u3).includes(norm(q.m.n).toLowerCase());
            info = `Los colores eran: ${q.d1.n}, ${q.d2.n}, ${q.m.n}`;
        }

        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        fb.style.backgroundColor = correct ? '#1b4332' : '#4e1616';
        fb.style.color = correct ? '#81c784' : '#e57373';
        fb.innerText = correct ? "¡Excelente! Respuesta correcta." : `Incorrecto. ${info}`;

        if(correct) score++;
        
        const btn = document.getElementById('btn-action');
        btn.innerText = "Siguiente";
        btn.onclick = () => {
            currentQ++;
            if(currentQ < 10) showQuestion();
            else showResult();
        };
    }

    function showResult() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        
        // Escala chilena (60% exigencia)
        let nota = (score < 6) ? (score * 3 / 6) + 1 : ((score - 6) * 3 / 4) + 4;
        
        document.getElementById('final-grade').innerText = nota.toFixed(1);
        document.getElementById('final-stats').innerText = `Aprobaste ${score} de 10 ejercicios.`;
    }
</script>
</body>
</html>
